name: Terraform Deploy

on:
  pull_request: 
    branches: 
      - main
      - master
    types:
      - closed

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
#  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_acr_config: '{"login_server": "${{ secrets.ACR_LOGIN_SERVER }}", "username": "${{ secrets.ACR_LOGIN_USERNAME }}", "password": "${{ secrets.ACR_LOGIN_TOKEN }}"}'
  TF_VAR_config: '{"ssh_key_path": "${{ secrets.VM_SSH_KEY_PATH }}", "username": "${{ secrets.VM_USERNAME }}", "password": "${{ secrets.VM_PASSWORD }}!"}'

jobs:
  terraform-plan:
    if: github.event.pull_request.merged == true
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./azure_terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - uses: ./.github/actions/setup-terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan 

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./azure_terraform/tfplan 

  terraform-apply:
    if: github.event.pull_request.merged == true
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production 
    permissions:
      id-token: write 
      contents: read
    defaults:
      run:
        working-directory: ./azure_terraform
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-terraform

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./azure_terraform/ 

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform-destroy:
    if: github.event.pull_request.merged == true
    name: 'Terraform destroy'
    runs-on: ubuntu-latest
    needs: terraform-apply
    environment: production 
    permissions:
      id-token: write 
      contents: read
    defaults:
      run:
        working-directory: ./azure_terraform
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-terraform
      
      - name: Terraform destroy
        run: terraform destroy -auto-approve