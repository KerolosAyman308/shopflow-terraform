name: "Setup and Init Terraform"
description: "Checks out code, sets up TF, and initializes"
runs:
  using: "composite"
  steps:
    - name: Azure Login via OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ env.ARM_CLIENT_ID }}
        tenant-id: ${{ env.ARM_TENANT_ID }}
        subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config="storage_account_name=${{ env.TF_STORAGE_ACCOUNT }}" -backend-config="access_key=${{ env.TF_STORAGE_ACCOUNT_KEY }}"
      shell: bash
      working-directory: ./azure_terraform
