#cloud-config
package_update: true
package_upgrade: true
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G
packages:
  - curl

write_files:
  - path: /opt/pull-acr-image.sh
    permissions: "0700"
    owner: root:root
    content: |
      #!/bin/bash
      # Define ACR variables
      ACR_REGISTRY="${acr_login_server}"
      ACR_USERNAME="${acr_username}"
      ACR_PASSWORD="${acr_password}"
      BACKEND_IMAGE_NAME="ecommerce-backend:latest"
      FRONTEND_IMAGE_NAME="ecommerce-frontend:latest"

      echo "Logging into Azure Container Registry..."
      # Use --password-stdin to prevent password warnings in logs
      echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" --username "$ACR_USERNAME" --password-stdin

      echo "Pulling Docker image..."

      docker pull "$${ACR_REGISTRY}/$${BACKEND_IMAGE_NAME}"
      docker pull "$${ACR_REGISTRY}/$${FRONTEND_IMAGE_NAME}"

      cat << 'EOF' > /tmp/backend/.env
      PORT=8000
      NODE_ENV=production

      # Public URLs (CORS + email templates)
      BASE_URL=http://${load_balancer_ip}:8000
      FRONTEND_URL=http://${load_balancer_ip}:3000

      DB_NAME=${db_name}
      DB_USER=${db_user}
      DB_PASSWORD=${db_password}
      DB_HOST=${db_host}

      JWT_SECRET=super_secret_jwt_token_123
      ADMIN_JWT_SECRET=super_secret_admin_jwt_token_123
      JWT_REFRESH_SECRET=super_secret_refresh_jwt_token_123
      JWT_ACCESS_EXPIRES_IN=24h
      JWT_REFRESH_EXPIRES_IN=30d

      EMAIL_USER=
      EMAIL_PASSWORD=

      GOOGLE_CLIENT_ID=

      FACEBOOK_URL=
      TWITTER_URL=
      INSTAGRAM_URL=
      LOGO_URL=http://${load_balancer_ip}:8000/static/image/STRIKETECH-1.png

      SMTP_HOST=
      SMTP_PORT=
      SMTP_USER=
      SMTP_PASSWORD=
      SMTP_FROM=
      EOF

      cat << 'EOF' > /tmp/frontend/.env
      NEXT_PUBLIC_API_URL=http://${load_balancer_ip}:8000
      NEXT_PUBLIC_STORE_NAME=Our store
      NEXT_PUBLIC_AFFILIATE_COMMISSION_PCT=15
      EOF

      docker run -d --name backend --env-file /tmp/backend/.env -p 8000:8000 "$${ACR_REGISTRY}/$${BACKEND_IMAGE_NAME}"
      docker run -d --name frontend --env-file /tmp/frontend/.env -p 3000:3000 "$${ACR_REGISTRY}/$${FRONTEND_IMAGE_NAME}"

runcmd:
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh

  - systemctl enable docker
  - systemctl start docker

  - /opt/pull-acr-image.sh

  - rm /opt/pull-acr-image.sh
